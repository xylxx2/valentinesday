<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Present</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff4e88,#ff1e56,#ff6f91);
    display:flex;
    justify-content:center; /* centre horizontalement */
    align-items:center;     /* centre verticalement */
    min-height:100vh;
    padding:20px;
    color:white;
}

/* Conteneur 2 colonnes */
.container {
    display:flex;
    gap:50px;
    max-width:900px; /* limite la largeur totale */
    width:100%;
    justify-content:center; /* centre le contenu si plus petit que max-width */
    align-items:center;
}

/* Colonne gauche: dessin + texte */
.left {
    flex:0.8; /* réduit la largeur relative */
    max-width:350px; /* largeur max du cadre gauche */
    background:rgba(255,255,255,0.1);
    border: 3px solid white;
    border-radius:20px;
    padding:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.left img {
    width:100%;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    margin-bottom:10px;
}

/* Texte style bande dessinée */
.left .message {
    font-size:16px;
    font-weight:bold;
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:15px;
    border:2px solid white;
    box-shadow:2px 2px 5px rgba(0,0,0,0.5);
}

/* Colonne droite: CD clickable */
.right {
    flex:0.5;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    text-align:center;
}

.right img {
    width:180px; /* un peu plus petit pour harmoniser */
    border-radius:50%;
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    transition: transform 0.3s;
}

.right img:hover {
    transform: rotate(15deg) scale(1.05);
}

.right .cd-text {
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
    color:white;
}

/* Pop-up vidéo */
.popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.popup-content {
    position:relative;
    background:#fff;
    border-radius:12px;
    padding:20px;
    max-width:80%;
}

.popup-content video, .popup-content iframe {
    width:560px;
    height:315px;
}

.close-btn {
    position:absolute;
    top:-10px;
    right:-10px;
    width:25px;
    height:25px;
    border:none;
    border-radius:50%;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.back-btn {
    position: fixed;      /* reste toujours en haut à gauche */
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: hotpink;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 1000; /* toujours au-dessus */
}

.back-btn:hover {
    background: white;
    color: hotpink;
    transform: translateY(-2px);
}
</style>
</head>
<body>
    <button class="back-btn" onclick="location.href='index.html'">← Back</button>

<div class="container">
    <!-- Colonne gauche -->
    <div class="left">
        <img src="milo.png" alt="Dessin">
        <div class="message">
            I'm a little embarrassed, but here it is, I wrote it with you in mind ❤︎
        </div>
    </div>

    <!-- Colonne droite -->
    <div class="right" id="cdContainer">
        <img src="cd.png" alt="CD">
        <div class="cd-text">click on something pretty ♡(˃͈ ˂͈ )</div>
    </div>
</div>

<!-- Pop-up vidéo -->
<div class="popup" id="videoPopup">
    <div class="popup-content">
        <button class="close-btn" id="closePopup">&times;</button>
        <iframe 
            src="https://www.youtube.com/embed/9XJHIQRnVwM?autoplay=1" 
            title="Video" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>

<script>
const cdContainer = document.getElementById('cdContainer');
const popup = document.getElementById('videoPopup');
const closeBtn = document.getElementById('closePopup');

cdContainer.addEventListener('click', () => {
    popup.style.display = 'flex';
});

closeBtn.addEventListener('click', () => {
    popup.style.display = 'none';
});

// Fermer si clic en dehors du contenu
popup.addEventListener('click', (e) => {
    if(e.target === popup){
        popup.style.display = 'none';
    }
});
</script>

</body>

</html>

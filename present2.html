<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Present</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff4e88,#ff1e56,#ff6f91);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
    color:white;
    text-align:center;
    position: relative;
    overflow: hidden;
}

/* Canvas arrière-plan */
#heartsCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* Bouton retour */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: hotpink;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 2;
}

.back-btn:hover {
    background: white;
    color: hotpink;
}

/* Layout principal */
.main-wrapper {
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 1;
}

/* Carte Milo */
.card {
    background: rgba(255,255,255,0.1);
    border: 3px solid white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    margin-bottom: 15px;
}

.card .message {
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 15px;
    border: 2px solid white;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Gift section */
.gift-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.gift-section img {
    width: 240px; /* plus grande */
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    margin-bottom: 10px;
    transition: 0.3s;
}

.gift-section:hover img {
    transform: scale(1.07);
}

.gift-text {
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 5px;
}

.here-text {
    font-size: 15px;
    opacity: 0.85;
    font-style: italic;
    letter-spacing: 1px;
}

/* Popup */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index: 10;
    animation: fadeIn 0.4s ease;
}

.popup.hidden {
    display:none;
}

.popup-content {
    text-align:center;
    animation: pop 0.5s ease;
    position: relative;
}

.popup-content img {
    width: 380px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.close {
    position:absolute;
    top:-20px;
    right:-20px;
    font-size:40px;
    cursor:pointer;
    color:white;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes pop {
    0% {transform:scale(0);}
    80% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

/* Responsive */
@media (max-width: 800px) {
    .main-wrapper {
        flex-direction: column;
        gap: 40px;
    }
}
</style>
</head>

<body>

<canvas id="heartsCanvas"></canvas>

<button class="back-btn" onclick="location.href='index.html'">← Back</button>

<div class="main-wrapper">

    <!-- Carte Milo -->
    <div class="card">
        <img src="happy-milo.png" alt="Happy Milo">
        <div class="message">
            ── ⋆⋅☆⋅⋆ Oh hi, welcome back! ⋆⋅☆⋅⋆ ── <br>
            𝑯𝒂𝒑𝒑𝒚 𝒃𝒊𝒓𝒕𝒉𝒅𝒂𝒚 ﾒ૦ﾒ૦
        </div>
    </div>

    <!-- Section Gift -->
    <div class="gift-section" id="giftTrigger">
        <img src="naya.jpeg" alt="Open Gift">
        <div class="gift-text">open your gift</div>
        <div class="here-text">here for u cutie pie 💗</div>
    </div>

</div>

<!-- Popup -->
<div class="popup hidden" id="popup">
    <div class="popup-content">
        <div class="close" id="closePopup">&times;</div>
        <img src="gift.jpeg">
    </div>
</div>

<script>
const giftTrigger = document.getElementById("giftTrigger");
const popup = document.getElementById("popup");
const closePopup = document.getElementById("closePopup");

giftTrigger.addEventListener("click", () => {
    popup.classList.remove("hidden");
});

closePopup.addEventListener("click", () => {
    popup.classList.add("hidden");
});

window.addEventListener("click", (e) => {
    if (e.target === popup) {
        popup.classList.add("hidden");
    }
});

/* Cœurs animés */
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const hearts = [];
for (let i = 0; i < 50; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 5 + Math.random() * 10,
        speed: 0.5 + Math.random(),
        angle: Math.random() * Math.PI * 2,
        alpha: 0.1 + Math.random() * 0.3
    });
}

function drawHeart(x, y, size, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size/20, size/20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(0,-3, -5,-5, -10,0);
    ctx.bezierCurveTo(-15,5, -10,12, 0,20);
    ctx.bezierCurveTo(10,12, 15,5, 10,0);
    ctx.bezierCurveTo(5,-5,0,-3,0,0);
    ctx.fill();
    ctx.restore();
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h => {
        h.y -= h.speed;
        h.x += Math.sin(h.angle) * 0.5;
        h.angle += 0.02;
        if (h.y + h.size < 0) h.y = canvas.height + h.size;
        drawHeart(h.x, h.y, h.size, h.alpha);
    });
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

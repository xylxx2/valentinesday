<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Present</title>
<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff4e88,#ff1e56,#ff6f91);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
    color:white;
    text-align:center;
    flex-direction:column;
    position: relative;
    overflow: hidden;
}

/* Canvas arrière-plan cœurs */
#heartsCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* Bouton retour en haut à gauche */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: hotpink;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 2;
}

.back-btn:hover {
    background: white;
    color: hotpink;
    transform: translateY(-2px);
}

/* Cadre pour la photo + texte */
.card {
    background: rgba(255,255,255,0.1);
    border: 3px solid white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    max-width: 400px;
    width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
}

.card img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    margin-bottom: 15px;
}

/* Texte style bande dessinée */
.card .message {
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 15px;
    border: 2px solid white;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Responsive */
@media (max-width: 500px) {
    .card { max-width: 90%; }
    .card .message { font-size: 14px; padding: 8px; }
    .back-btn { padding: 8px 16px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- Canvas pour cœurs -->
<canvas id="heartsCanvas"></canvas>

<!-- Bouton retour -->
<button class="back-btn" onclick="location.href='index.html'">← Back</button>

<!-- Contenu central -->
<div class="card">
    <img src="tired-milo.png" alt="Second Present Photo">
    <div class="message">
        Website under development, please come back on February 26, 2026 ദ്ദി◝ ⩊ ◜.ᐟ 🚧
    </div>
</div>

<script>
// Cœurs animés
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const hearts = [];
const heartCount = 50;

for (let i = 0; i < heartCount; i++) {
    hearts.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 5 + Math.random() * 10,
        speed: 0.5 + Math.random(),
        angle: Math.random() * Math.PI * 2,
        alpha: 0.1 + Math.random() * 0.3
    });
}

function drawHeart(x, y, size, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size/20, size/20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(0,-3, -5,-5, -10,0);
    ctx.bezierCurveTo(-15,5, -10,12, 0,20);
    ctx.bezierCurveTo(10,12, 15,5, 10,0);
    ctx.bezierCurveTo(5,-5,0,-3,0,0);
    ctx.fill();
    ctx.restore();
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h => {
        h.y -= h.speed;
        h.x += Math.sin(h.angle) * 0.5;
        h.angle += 0.02;
        if (h.y + h.size < 0) h.y = canvas.height + h.size;
        if (h.x - h.size > canvas.width) h.x = -h.size;
        if (h.x + h.size < 0) h.x = canvas.width + h.size;
        drawHeart(h.x, h.y, h.size, h.alpha);
    });
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Second Present</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff4e88,#ff1e56,#ff6f91);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
    color:white;
    text-align:center;
    position: relative;
    overflow: hidden;
}

/* Canvas arrière-plan */
#heartsCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
}

/* Bouton retour */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: hotpink;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 2;
}

.back-btn:hover {
    background: white;
    color: hotpink;
}

/* Bouton vinyle (en haut à droite) */
#vinylBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    background: url('vinyle.png') no-repeat center/contain;
    z-index: 2;
    transition: transform 0.5s ease;
}

/* Countdown */
.countdown {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-weight: bold;
    font-size: 18px;
    background: rgba(255,255,255,0.2);
    padding: 10px 22px;
    border-radius: 25px;
    backdrop-filter: blur(6px);
    border: 2px solid white;
    z-index: 2;
    letter-spacing: 1px;
}

/* Layout principal */
.main-wrapper {
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 1;
}

/* Carte Milo */
.card {
    background: rgba(255,255,255,0.1);
    border: 3px solid white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    margin-bottom: 15px;
}

.card .message {
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 15px;
    border: 2px solid white;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

/* Gift section */
.gift-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.gift-section img {
    width: 240px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    margin-bottom: 10px;
    transition: 0.3s;
}

.gift-section:hover img {
    transform: scale(1.07);
}

.gift-text {
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 5px;
}

.here-text {
    font-size: 15px;
    opacity: 0.85;
    font-style: italic;
    letter-spacing: 1px;
}

/* Popup */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index: 10;
    animation: fadeIn 0.4s ease;
}

.popup.hidden {
    display:none;
}

.popup-content {
    text-align:center;
    animation: pop 0.5s ease;
    position: relative;
    max-width: 900px;
    width: 90%;
}

.popup-inner {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
}

.popup-inner img {
    width: 450px;
    max-width: 90%;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.popup-text {
    max-width: 400px;
    text-align: left;
    font-size: 16px;
    line-height: 1.5;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    border: 2px solid white;
    color: white;
    font-weight: 500;
    white-space: pre-wrap;
    transition: opacity 0.8s ease;
}

.close {
    position:absolute;
    top:-20px;
    right:-20px;
    font-size:40px;
    cursor:pointer;
    color:white;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes pop {
    0% {transform:scale(0);}
    80% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

/* Responsive */
@media (max-width: 800px) {
    .main-wrapper {
        flex-direction: column;
        gap: 40px;
    }

    .popup-inner {
        flex-direction: column;
    }

    .popup-inner img,
    .popup-text {
        width: 90%;
    }
}
</style>
</head>

<body>

<canvas id="heartsCanvas"></canvas>

<!-- Bouton retour -->
<button class="back-btn" onclick="location.href='index.html'">← Back</button>

<!-- Vinyle bouton haut à droite -->
<button id="vinylBtn" title="Play Music"></button>

<!-- Countdown -->
<div class="countdown" id="countdown">⏳ Loading...</div>

<div class="main-wrapper">

    <!-- Carte Milo -->
    <div class="card">
        <img src="milo-cake.png" alt="Happy Milo">
        <div class="message">
            ⋆⋅☆⋅⋆ Oh hi love, welcome back! ⋆⋅☆⋅⋆ <br>
            𝑯𝒂𝒑𝒑𝒚 𝒃𝒊𝒓𝒕𝒉𝒅𝒂𝒚 ﾒ૦ﾒ૦
        </div>
    </div>

    <!-- Section Gift -->
    <div class="gift-section" id="giftTrigger">
        <img src="naya.jpeg" alt="Open Gift">
        <div class="gift-text">open your gift</div>
        <div class="here-text">here for u cutie pie 💗</div>
    </div>

</div>

<!-- Popup -->
<div class="popup hidden" id="popup">
    <div class="popup-content">
        <div class="close" id="closePopup">&times;</div>
        <div class="popup-inner">
            <img src="gift.jpeg" alt="Our Picture">
            <div class="popup-text" id="popupText"></div>
        </div>
    </div>
</div>

<!-- Audio MP3 local -->
<audio id="vinylAudio" src="Just-the-two-of-us.mp3"></audio>

<script>
/* Countdown */
const countdownElement = document.getElementById("countdown");
const targetDate = new Date("February 26, 2026 00:00:00").getTime();
function updateCountdown() {
    const now = new Date().getTime();
    const distance = targetDate - now;
    if (distance <= 0) {
        countdownElement.innerHTML = "HAPPY BIRTHDAY BESTIE";
        return;
    }
    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    const seconds = Math.floor((distance % (1000*60))/1000);
    countdownElement.innerHTML = `⏱ ${days}d ${hours}h ${minutes}m ${seconds}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* Popup texte animé */
const giftTrigger = document.getElementById("giftTrigger");
const popup = document.getElementById("popup");
const closePopup = document.getElementById("closePopup");
const popupText = document.getElementById("popupText");
const message = 'Since we can’t gaze at the sky together, here is our picture taken on our perfect date, a glimpse of us on our perfect day, as though time, moved by love, chose to stand still (Naya captured it for us ೀ ദ്ദി◝ ⩊ ◜.ᐟ ೀ).\n\nI wish I could remain forever in this quiet haven we call ours, suspended in its softness, where nothing exists but you and me. Yet while we wait for the day we can truly live it, I hope this image is enough to hold the moment in place and freeze our love in a frame, untouched by time.\n\nHappy birthday, love (っ˕ -｡) ༘⋆✴︎˚｡';
let index = 0;
function typeText() {
    if(index<message.length){
        popupText.innerHTML+=message.charAt(index);
        index++;
        setTimeout(typeText,20);
    }
}
giftTrigger.addEventListener("click",()=>{
    popup.classList.remove("hidden");
    popupText.innerHTML="";
    index=0;
    popupText.style.opacity=0;
    setTimeout(()=>{popupText.style.opacity=1; typeText();},2000);
});
closePopup.addEventListener("click",()=>popup.classList.add("hidden"));
window.addEventListener("click",(e)=>{if(e.target===popup) popup.classList.add("hidden");});

/* Cœurs animés */
const canvas=document.getElementById('heartsCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
const hearts=[];
for(let i=0;i<50;i++){hearts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:5+Math.random()*10,speed:0.5+Math.random(),angle:Math.random()*Math.PI*2,alpha:0.1+Math.random()*0.3});}
function drawHeart(x,y,size,alpha){ctx.save();ctx.translate(x,y);ctx.scale(size/20,size/20);ctx.globalAlpha=alpha;ctx.fillStyle='white';ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(0,-3,-5,-5,-10,0);ctx.bezierCurveTo(-15,5,-10,12,0,20);ctx.bezierCurveTo(10,12,15,5,10,0);ctx.bezierCurveTo(5,-5,0,-3,0,0);ctx.fill();ctx.restore();}
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);hearts.forEach(h=>{h.y-=h.speed;h.x+=Math.sin(h.angle)*0.5;h.angle+=0.02;if(h.y+h.size<0) h.y=canvas.height+h.size;drawHeart(h.x,h.y,h.size,h.alpha);});requestAnimationFrame(animate);}
animate();

/* Vinyle cliquable pour MP3 local */
const vinylBtn=document.getElementById('vinylBtn');
const vinylAudio=document.getElementById('vinylAudio');
let musicPlaying=false;
vinylBtn.addEventListener('click',()=>{
    if(!musicPlaying){
        vinylAudio.play();
        vinylBtn.style.transform="rotate(360deg)";
        musicPlaying=true;
    } else {
        vinylAudio.pause();
        vinylBtn.style.transform="rotate(0deg)";
        musicPlaying=false;
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Valentine's Day</title>
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff4e88, #ff1e56, #ff6f91);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 40px 20px;
    color: white;
    text-align: center;
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

/* ===== HEARTS BACKGROUND ===== */
.heart {
    position: absolute;
    font-size: 20px;
    color: white;
    opacity: 0.4;
    animation: floatHeart linear infinite;
}

@keyframes floatHeart {
    0% { transform: translateY(0); opacity: 0.4; }
    100% { transform: translateY(-200px); opacity: 0; }
}

/* ===== TITLES ===== */
h1 {
    font-size: 42px;
    margin: 60px 0 10px 0; /* réduit l'espace avec le paragraphe */
    color: #ffe0f0;
}

h2 {
    font-size: 32px;
    margin: 40px 0 10px 0;
}

h3 {
    font-size: 24px;
    margin: 25px 0 10px 0;
}

p {
    font-size: 18px;
    line-height: 1.6;
    max-width: 800px;
    margin: 5px auto 20px auto; /* rapproche le paragraphe du titre */
    text-align: center;
}

/* ===== IMAGE GIFT ===== */
#giftImage {
    max-width: 150px;
    width: 90%;
    border-radius: 15px;
    margin: 15px 0 5px 0;
}

#giftCaption {
    font-size: 14px;
    color: #ffe0f0;
    margin-bottom: 40px;
    text-align: center;
}

/* ===== BUTTONS ===== */
.buttons {
    display: flex;
    gap: 20px;
    margin-bottom: 50px;
    justify-content: center;
}

button {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    background: hotpink;
    color: white;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

button:hover {
    background: white;
    color: hotpink;
    transform: translateY(-3px);
}

#btnInfo {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    font-weight: bold;
    font-size: 18px;
    background: white;
    color: hotpink;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#btnInfo:hover {
    background: hotpink;
    color: white;
}

/* ===== CONSTELLATION ===== */
.subtitle {
    width: 1100px;
    max-width: 95%;
    font-size: 16px;
    margin-bottom: 10px;
    text-align: left;
    color: #fff0f7;
}

.constellation-card {
    width: 1100px;
    max-width: 95%;
    background: #14000c;
    border: 4px solid white;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    padding: 30px;
    margin-bottom: 60px;
}

#constellation {
    position: relative;
    width: 100%;
    height: 400px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.star {
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px white;
    cursor: pointer;
    transition: 0.2s;
}

.star.start {
    background: hotpink;
    box-shadow: 0 0 15px hotpink;
}

.star:hover {
    transform: scale(1.5);
}

.tooltip {
    position: absolute;
    background: hotpink;
    padding: 4px 8px;
    border-radius: 10px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    transition: 0.2s;
    pointer-events: none;
}

/* ===== FORM BOX ===== */
.form-box {
    background: #14000c;
    padding: 30px;
    border-radius: 20px;
    margin: 30px auto 50px auto;
    width: 600px;
    max-width: 95%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.form-box label {
    display: block;
    margin: 10px 0;
    text-align: left;
    cursor: pointer;
}

.form-box input[type="text"] {
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;
}
</style>
</head>
<body>

<h1>────୨ৎ──── Happy first Valentine's Day ────୨ৎ────</h1>

<p><strong>- ༝༚ February 14, 2026 ༝༚ - </strong></p>

<!-- ===== GIFT IMAGE + CAPTION ===== -->
<img id="giftImage" src="https://i.pinimg.com/736x/33/cb/cb/33cbcb4d56c375f18f9680aaf984014a.jpg" alt="Chocolate Gift">
<div id="giftCaption">
<em>Since I can't be with you, consider this my gift <br>
(I ate them all) #ilovechocolatesorry</em> (っ｡˘ڡ˘ς)𖹭
</div>

<!-- ===== BUTTONS ===== -->
<div class="buttons">
    <button id="btnInfo">i</button>
    <button id="btnPresent1">open my first present</button>
    <button id="btnPresent2">open my second present</button>
</div>

<!-- ===== CONSTELLATION ===== -->
<div class="subtitle">
    <strong>Connect these stars to read the word (╭ರ_•́)</strong> <br>
    <em>(shshsh, ofc you don't know yet what is written there)</em>
</div>

<div class="constellation-card">
    <div id="constellation">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
/* ===== HEARTS BACKGROUND ===== */
const numberOfHearts = 30;
for (let i = 0; i < numberOfHearts; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "♥";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = 50 + Math.random() * 30 + "px"; // juste au-dessus du titre
    heart.style.fontSize = 10 + Math.random() * 20 + "px";
    heart.style.animationDuration = 3 + Math.random() * 3 + "s";
    document.body.appendChild(heart);
}

/* ===============================
   WORDS
================================= */
const words = [
"soul","personality","eyes","lips","smile","tongue","teeth","ears",
"voice","forehead","face","hands","hair","feet","dih","laugh",
"humor","intelligence","ahh","cuteness","kindness","craziness",
"behavior","uniqueness","body","attention","religion","jealousy",
"attractiveness","gestures","dirty talk","hot"
];

/* ===============================
   CONSTELLATION SETUP
================================= */
const constellationContainer = document.getElementById("constellation");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = constellationContainer.clientWidth;
canvas.height = constellationContainer.clientHeight;

let groups = { I:[], heart:[], U:[] };
const topY = 50;
const bottomY = 330;
const height = bottomY - topY;

/* ===== I ===== */
for(let i=0;i<8;i++){
    groups.I.push({ x:150, y: topY + (height/7)*i });
}

/* ===== HEART ===== */
const centerX = canvas.width/2;
const centerY = (topY+bottomY)/2;
const size = 90;

for(let i=0;i<16;i++){
    const t = (i/16) * Math.PI * 2;
    const x = centerX + size * Math.pow(Math.sin(t),3);
    const y = centerY - size * (
        0.8*Math.cos(t) - 0.3*Math.cos(2*t) - 0.1*Math.cos(3*t)
    );
    groups.heart.push({x,y});
}

/* ===== U ===== */
const ux = canvas.width - 150;
const widthU = 120;
groups.U.push({x:ux-widthU/2,y:topY});
groups.U.push({x:ux-widthU/2,y:topY+height/3});
groups.U.push({x:ux-widthU/2,y:topY+2*height/3});
groups.U.push({x:ux-widthU/4,y:bottomY});
groups.U.push({x:ux+widthU/4,y:bottomY});
groups.U.push({x:ux+widthU/2,y:topY+2*height/3});
groups.U.push({x:ux+widthU/2,y:topY+height/3});
groups.U.push({x:ux+widthU/2,y:topY});

let clicked = {I:[],heart:[],U:[]};
let globalIndex = 0;

/* ===== CREATE STARS ===== */
["I","heart","U"].forEach(shape=>{
    groups[shape].forEach((point,localIndex)=>{
        const star=document.createElement("div");
        star.className="star";
        if(localIndex===0) star.classList.add("start");
        star.style.left=point.x+"px";
        star.style.top=point.y+"px";

        const tooltip=document.createElement("div");
        tooltip.className="tooltip";
        tooltip.innerText=words[globalIndex];

        constellationContainer.appendChild(tooltip);

        star.addEventListener("mouseenter",()=>{
            tooltip.style.left=(point.x+15)+"px";
            tooltip.style.top=(point.y-10)+"px";
            tooltip.style.opacity=1;
        });

        star.addEventListener("mouseleave",()=>{ tooltip.style.opacity=0; });

        star.addEventListener("click",()=>{
            if(clicked[shape].length===localIndex){
                clicked[shape].push(point);
                draw();
            }
        });

        constellationContainer.appendChild(star);
        globalIndex++;
    });
});

/* ===== DRAW LINES ===== */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    Object.keys(clicked).forEach(shape=>{
        if(clicked[shape].length>1){
            ctx.beginPath();
            ctx.strokeStyle="hotpink";
            ctx.lineWidth=3;
            clicked[shape].forEach((p,i)=>{
                if(i===0) ctx.moveTo(p.x,p.y);
                else ctx.lineTo(p.x,p.y);
            });
            ctx.stroke();
        }
    });
}

/* ===== BUTTON ACTIONS ===== */
document.getElementById('btnInfo').addEventListener('click', () => {
    window.location.href = 'info.html';
});

document.getElementById('btnPresent1').addEventListener('click', () => {
    window.open('present1.html', '_blank');
});

document.getElementById('btnPresent2').addEventListener('click', () => {
    window.open('present2.html', '_blank');
});
</script>

</body>
</html>
